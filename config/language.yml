# Framework Language Configuration
# 框架語言設定
#
# This file controls the language used in templates and user-facing content.
# Supported: zh-TW (繁體中文), en (English)
#
# To add a new language:
# 1. Create templates in intake/templates/{lang}/ (optional override)
# 2. Update this config
# 3. AI agents will use the configured language for generated content

# Primary language for templates and generated content
# 主要語言
primary: zh-TW

# Secondary language for bilingual output (set to null to disable)
# 次要語言（設為 null 則不啟用雙語）
secondary: en

# Language-specific settings
languages:
  zh-TW:
    name: 繁體中文
    user_story_format: "**作為**〔角色〕，**我想要**〔功能〕，**以便**〔目的〕"
    status_labels:
      draft: 草稿
      in-review: 審核中
      approved: 已批准
      in-progress: 進行中
      done: 已完成
    severity_labels:
      critical: 很急
      warning: 普通
      info: 不急

  en:
    name: English
    user_story_format: "**As a** [role], **I want** [feature], **so that** [benefit]"
    status_labels:
      draft: Draft
      in-review: In Review
      approved: Approved
      in-progress: In Progress
      done: Done
    severity_labels:
      critical: Critical
      warning: Warning
      info: Info
