# Multi-Project Deployment Registry
# 多專案部署註冊表
#
# 此檔案是框架的一部分，提供多專案部署的「設定範本」。
# 使用此框架的團隊在導入時，複製此檔案並填入自己的專案資訊。
#
# ─────────────────────────────────────────
# 使用方式：
#   1. 複製此檔案為 projects.local.yml（已加入 .gitignore）
#   2. 填入你的 Coolify URL、API Token、專案 UUID
#   3. CD workflow 會讀取 projects.local.yml 進行部署
# ─────────────────────────────────────────

# ── 全域設定 ──────────────────────────────
coolify:
  url: "${COOLIFY_URL}"           # Coolify 實例 URL（存在 GitHub Secrets）
  api_token: "${COOLIFY_API_TOKEN}" # API Token（存在 GitHub Secrets）

# ── 專案列表 ──────────────────────────────
# 每個採用此框架的專案，在此註冊其部署資訊。
# UUID 從 Coolify Dashboard > Application > Settings 取得。
projects:

  # ── 範例專案 A ─────────────────────────
  example-project-a:
    name: "專案 A 名稱"
    repo: "your-org/project-a"
    staging:
      app_uuid: "${COOLIFY_PROJECTA_STAGING_UUID}"
      domain: "project-a-staging.yourcompany.com"
      branch: "main"
      health_check: "/health"
      health_check_retries: 10
      health_check_interval: 15    # seconds
    production:
      app_uuid: "${COOLIFY_PROJECTA_PROD_UUID}"
      domain: "project-a.yourcompany.com"
      branch: "main"
      health_check: "/health"
      health_check_retries: 15
      health_check_interval: 20
      requires_approval: true
      deploy_strategy: "rolling"   # rolling | canary | blue-green

  # ── 範例專案 B ─────────────────────────
  # example-project-b:
  #   name: "專案 B 名稱"
  #   repo: "your-org/project-b"
  #   staging:
  #     app_uuid: "${COOLIFY_PROJECTB_STAGING_UUID}"
  #     domain: "project-b-staging.yourcompany.com"
  #     branch: "main"
  #     health_check: "/api/health"
  #     health_check_retries: 10
  #     health_check_interval: 15
  #   production:
  #     app_uuid: "${COOLIFY_PROJECTB_PROD_UUID}"
  #     domain: "project-b.yourcompany.com"
  #     branch: "main"
  #     health_check: "/api/health"
  #     health_check_retries: 15
  #     health_check_interval: 20
  #     requires_approval: true
  #     deploy_strategy: "canary"

# ── 共用服務（選用） ──────────────────────
shared_services:
  monitoring:
    prometheus_uuid: "${COOLIFY_PROMETHEUS_UUID}"
    grafana_uuid: "${COOLIFY_GRAFANA_UUID}"
    alertmanager_uuid: "${COOLIFY_ALERTMANAGER_UUID}"

# ── 需要設定的 GitHub Secrets ─────────────
# 以下 Secrets 存放在「使用此框架的專案 repo」中，不在框架 repo 中。
#
# 共用：
#   COOLIFY_URL                          - Coolify 實例 URL
#   COOLIFY_API_TOKEN                    - Coolify API Token
#
# 每個專案：
#   COOLIFY_{PROJECT}_STAGING_UUID       - Staging app 的 UUID
#   COOLIFY_{PROJECT}_PROD_UUID          - Production app 的 UUID
