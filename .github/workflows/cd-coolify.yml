# ──────────────────────────────────────────────
# CD Pipeline — Coolify Deployment (Framework)
# ──────────────────────────────────────────────
# 這是需求驅動開發框架的通用 Coolify 部署 workflow。
#
# 此 workflow 是「範本」——採用此框架的專案將此檔案複製到
# 自己的 repo 中，並設定對應的 GitHub Secrets。
#
# 部署方式：
#   1. 自動：push to main → staging
#   2. 手動：workflow_dispatch → 選擇環境
# ──────────────────────────────────────────────

name: "CD — Coolify Deploy"

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: write

jobs:
  # ── Determine deployment target ─────────────
  prepare:
    name: "🔍 Prepare"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      app_uuid: ${{ steps.config.outputs.app_uuid }}
      health_url: ${{ steps.config.outputs.health_url }}
      health_retries: ${{ steps.config.outputs.health_retries }}
      health_interval: ${{ steps.config.outputs.health_interval }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine target
        id: config
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          else
            ENV="staging"
          fi
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"

          # Read from GitHub Secrets (set by the adopting project)
          if [ "$ENV" = "staging" ]; then
            echo "app_uuid=${{ secrets.COOLIFY_STAGING_UUID }}" >> "$GITHUB_OUTPUT"
            echo "health_url=${{ secrets.STAGING_HEALTH_URL }}" >> "$GITHUB_OUTPUT"
            echo "health_retries=10" >> "$GITHUB_OUTPUT"
            echo "health_interval=15" >> "$GITHUB_OUTPUT"
          else
            echo "app_uuid=${{ secrets.COOLIFY_PROD_UUID }}" >> "$GITHUB_OUTPUT"
            echo "health_url=${{ secrets.PROD_HEALTH_URL }}" >> "$GITHUB_OUTPUT"
            echo "health_retries=15" >> "$GITHUB_OUTPUT"
            echo "health_interval=20" >> "$GITHUB_OUTPUT"
          fi

  # ── Spec Gate ───────────────────────────────
  spec-gate:
    name: "🚪 Spec Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check spec approval
        run: |
          BLOCKED=false
          for spec in specs/*/spec.md; do
            [ -f "$spec" ] || continue
            STATUS=$(grep -oP '## 狀態：\s*`\K[^`]+' "$spec" 2>/dev/null || echo "unknown")
            if [ "$STATUS" = "draft" ] || [ "$STATUS" = "in-review" ]; then
              echo "⚠️ $spec has status '$STATUS'"
              BLOCKED=true
            fi
          done
          if [ "$BLOCKED" = true ]; then
            echo "::warning::Some specs are not approved"
          fi

  # ── Deploy Staging ──────────────────────────
  deploy-staging:
    name: "🚀 Deploy Staging"
    runs-on: ubuntu-latest
    needs: [prepare, spec-gate]
    if: needs.prepare.outputs.environment == 'staging'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Coolify
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ needs.prepare.outputs.app_uuid }}
          HEALTH_CHECK_URL: ${{ needs.prepare.outputs.health_url }}
          HEALTH_RETRIES: ${{ needs.prepare.outputs.health_retries }}
          HEALTH_INTERVAL: ${{ needs.prepare.outputs.health_interval }}
        run: bash infra/coolify/deploy.sh app staging

      - name: Feedback on failure
        if: failure()
        run: |
          DATE=$(date +%Y-%m-%d)
          REPO_NAME="${{ github.event.repository.name }}"
          INTAKE="intake/raw/${DATE}-auto-deploy-staging-failure.md"
          cat > "$INTAKE" << EOF
          # 🐛 部署失敗 / Deploy Failure

          **回報人 / Reporter**：CD Pipeline
          **緊急程度 / Urgency**：很急 Critical

          ## 發生了什麼事？
          staging 部署失敗，健康檢查未通過。
          - **Repo**: ${REPO_NAME}
          - **Commit**: ${{ github.sha }}
          - **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          git config user.name "feedback-loop[bot]"
          git config user.email "feedback-loop@noreply.github.com"
          git add "$INTAKE"
          git commit -m "feedback: auto-intake from staging deploy failure"
          git push

  # ── Deploy Production ───────────────────────
  deploy-production:
    name: "🏭 Deploy Production"
    runs-on: ubuntu-latest
    needs: [prepare, spec-gate]
    if: needs.prepare.outputs.environment == 'production'
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Coolify
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ needs.prepare.outputs.app_uuid }}
          HEALTH_CHECK_URL: ${{ needs.prepare.outputs.health_url }}
          HEALTH_RETRIES: "15"
          HEALTH_INTERVAL: "20"
        run: bash infra/coolify/deploy.sh app production

      - name: Feedback + post-mortem on failure
        if: failure()
        run: |
          DATE=$(date +%Y-%m-%d)
          REPO_NAME="${{ github.event.repository.name }}"

          INTAKE="intake/raw/${DATE}-auto-deploy-prod-failure.md"
          cat > "$INTAKE" << EOF
          # 🐛 正式環境部署失敗

          **回報人**：CD Pipeline
          **緊急程度**：很急
          - **Repo**: ${REPO_NAME}
          - **Commit**: ${{ github.sha }}
          - **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF

          POSTMORTEM="docs/postmortems/${DATE}-deploy-failure.md"
          mkdir -p docs/postmortems
          cat > "$POSTMORTEM" << EOF
          # 事後檢討：正式環境部署失敗
          - **事件日期**：${DATE}
          - **嚴重程度**：critical
          - **影響環境**：production

          ## 根本原因
          （待填寫）

          ## 5 Whys 分析
          1. →
          2. →
          3. →
          4. →
          5. → **根本原因**
          EOF

          git config user.name "feedback-loop[bot]"
          git config user.email "feedback-loop@noreply.github.com"
          git add "$INTAKE" "$POSTMORTEM"
          git commit -m "feedback: auto-intake + postmortem from prod deploy failure"
          git push
