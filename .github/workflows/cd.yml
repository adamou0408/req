# ──────────────────────────────────────────────
# CD Pipeline — Closed-Loop Deployment
# ──────────────────────────────────────────────
# Deploys to staging automatically, prod requires approval.
# Failed deployments trigger the feedback loop.

name: CD — Closed-Loop Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: demand-driven-dev
  PROJECT_NAME: demand-driven-dev

jobs:
  # ── Pre-flight checks ──────────────────────
  preflight:
    name: "🛫 Pre-flight Checks"
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.env.outputs.target }}
      image_tag: ${{ steps.env.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine target environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=staging" >> "$GITHUB_OUTPUT"
          fi
          echo "image_tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Verify all deployed specs are approved
        run: |
          echo "🔍 Verifying spec statuses..."
          UNAPPROVED=0

          for spec in specs/*/spec.md; do
            [ -f "$spec" ] || continue
            STATUS=$(grep -oP '`(in-progress|approved)`' "$spec" | head -1 | tr -d '`')
            if [ -z "$STATUS" ]; then
              SPEC_STATUS=$(grep -oP '`(draft|in-review)`' "$spec" | head -1 | tr -d '`')
              if [ -n "$SPEC_STATUS" ]; then
                echo "⚠️ $spec is '$SPEC_STATUS' — not ready for deploy"
                ((UNAPPROVED++))
              fi
            fi
          done

          if [ "$UNAPPROVED" -gt 0 ]; then
            echo "❌ $UNAPPROVED spec(s) not approved — blocking deployment"
            exit 1
          fi
          echo "✅ All specs approved"

  # ── Build & Push ────────────────────────────
  build-push:
    name: "🐳 Build & Push Image"
    runs-on: ubuntu-latest
    needs: [preflight]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.preflight.outputs.image_tag }}"
          docker build -f infra/docker/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "✅ Image pushed: $IMAGE_URI"

  # ── Deploy to Staging ───────────────────────
  deploy-staging:
    name: "🚀 Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [preflight, build-push]
    if: needs.preflight.outputs.target_env == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via Terraform
        working-directory: infra/terraform
        run: |
          terraform init
          terraform plan -var-file=environments/staging.tfvars \
            -var="app_image_tag=${{ needs.preflight.outputs.image_tag }}" \
            -out=tfplan
          terraform apply tfplan

      - name: Health check (closed-loop gate)
        id: health
        run: |
          ALB_URL=$(cd infra/terraform && terraform output -raw alb_dns_name 2>/dev/null || echo "")
          if [ -z "$ALB_URL" ]; then
            echo "⚠️ No ALB URL — skipping health check"
            exit 0
          fi

          echo "🏥 Running health check on $ALB_URL..."
          RETRIES=10
          for i in $(seq 1 $RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_URL/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Health check passed (attempt $i)"
              echo "healthy=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "⏳ Attempt $i/$RETRIES — HTTP $HTTP_CODE, retrying in 15s..."
            sleep 15
          done

          echo "❌ Health check failed after $RETRIES attempts"
          echo "healthy=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Trigger feedback loop on failure
        if: failure()
        run: |
          DATE=$(date +%Y-%m-%d)
          INTAKE_FILE="intake/raw/${DATE}-auto-deploy-staging-failure.md"

          cat > "$INTAKE_FILE" << 'INTAKE_EOF'
          # 🐛 自動問題回報（部署失敗）

          **回報人**：CI/CD 部署系統（自動產生）
          **回報日期**：$(date +%Y-%m-%d)
          **緊急程度**：很急

          ---

          ## 發生了什麼事？
          Staging 環境部署失敗。健康檢查未通過，系統已自動回滾到上一個版本。

          ## 部署資訊
          - **Commit**: ${{ github.sha }}
          - **Branch**: ${{ github.ref_name }}
          - **Triggered by**: ${{ github.actor }}
          - **Workflow run**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## 你本來預期會怎樣？
          部署應該成功，健康檢查應該回傳 200。

          ## 截圖或畫面
          請查看 GitHub Actions 日誌。
          INTAKE_EOF

          git config user.name "feedback-loop[bot]"
          git config user.email "feedback-loop@noreply.github.com"
          git add "$INTAKE_FILE"
          git commit -m "feedback: auto-intake from staging deploy failure"
          git push

          echo "📥 Feedback loop triggered — intake created: $INTAKE_FILE"

  # ── Deploy to Production (requires approval) ─
  deploy-prod:
    name: "🏭 Deploy to Production"
    runs-on: ubuntu-latest
    needs: [preflight, build-push]
    if: needs.preflight.outputs.target_env == 'prod'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.app_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via Terraform
        id: deploy
        working-directory: infra/terraform
        run: |
          terraform init
          terraform plan -var-file=environments/prod.tfvars \
            -var="app_image_tag=${{ needs.preflight.outputs.image_tag }}" \
            -out=tfplan
          terraform apply tfplan
          echo "app_url=https://$(terraform output -raw alb_dns_name)" >> "$GITHUB_OUTPUT"

      - name: Production health check
        run: |
          ALB_URL=$(cd infra/terraform && terraform output -raw alb_dns_name 2>/dev/null || echo "")
          if [ -z "$ALB_URL" ]; then
            echo "⚠️ No ALB URL available"
            exit 0
          fi

          echo "🏥 Production health check on $ALB_URL..."
          RETRIES=15
          for i in $(seq 1 $RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://$ALB_URL/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Production health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i/$RETRIES..."
            sleep 20
          done

          echo "❌ Production health check failed"
          exit 1

      - name: Trigger feedback loop on failure
        if: failure()
        run: |
          DATE=$(date +%Y-%m-%d)
          INTAKE_FILE="intake/raw/${DATE}-auto-deploy-prod-failure.md"

          cat > "$INTAKE_FILE" << 'INTAKE_EOF'
          # 🐛 自動問題回報（正式環境部署失敗）

          **回報人**：CI/CD 部署系統（自動產生）
          **緊急程度**：很急

          ## 發生了什麼事？
          正式環境部署失敗，已自動回滾。

          ## 部署資訊
          - **Commit**: ${{ github.sha }}
          - **Workflow**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          INTAKE_EOF

          git config user.name "feedback-loop[bot]"
          git config user.email "feedback-loop@noreply.github.com"
          git add "$INTAKE_FILE"
          git commit -m "feedback: auto-intake from prod deploy failure"
          git push

  # ── Post-deploy status report ───────────────
  report:
    name: "📊 Status Report"
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-prod]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate status report
        run: bash scripts/status-report.sh
