# ──────────────────────────────────────────────
# CI Pipeline — Spec Gate + Test
# ──────────────────────────────────────────────
# Closed-loop principle: code cannot merge unless
# its corresponding spec is approved and tests pass.

name: CI — Spec Gate & Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Step 1: Validate spec status ────────────
  spec-gate:
    name: "🚪 Spec Gate"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check spec approval status
        id: spec-check
        run: |
          echo "🔍 Checking spec approval status..."

          # Find all specs referenced in changed files
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")
          BLOCKED=false
          MESSAGES=""

          # Check if any changed src/ files have corresponding unapproved specs
          for file in $CHANGED_FILES; do
            if [[ "$file" == src/* ]]; then
              echo "Source file changed: $file"

              # Look for any spec that is NOT approved
              for spec in specs/*/spec.md; do
                [ -f "$spec" ] || continue
                STATUS=$(grep -oP '## 狀態：\s*`\K[^`]+' "$spec" 2>/dev/null || echo "unknown")
                SPEC_DIR=$(dirname "$spec")

                if [ "$STATUS" != "approved" ] && [ "$STATUS" != "in-progress" ] && [ "$STATUS" != "done" ]; then
                  MESSAGES="$MESSAGES\n⚠️ $spec has status '$STATUS' (must be 'approved' or later)"
                  BLOCKED=true
                fi
              done
            fi
          done

          if [ "$BLOCKED" = true ]; then
            echo -e "$MESSAGES"
            echo "❌ Spec gate BLOCKED — some specs are not approved"
            echo "blocked=true" >> "$GITHUB_OUTPUT"
            # Don't fail here — report in summary
          else
            echo "✅ Spec gate passed"
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report spec gate status
        if: steps.spec-check.outputs.blocked == 'true'
        run: |
          echo "::warning::Spec gate: Some source changes lack approved specs. Review required."

  # ── Step 2: Validate spec format ────────────
  spec-validate:
    name: "📋 Validate Specs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all spec files
        run: |
          ERRORS=0
          for spec_dir in specs/*/; do
            [ -d "$spec_dir" ] || continue
            [ -f "${spec_dir}spec.md" ] || continue

            echo "Validating $spec_dir..."
            if ! bash scripts/validate-spec.sh "$spec_dir"; then
              ((ERRORS++))
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "❌ $ERRORS spec(s) failed validation"
            exit 1
          fi
          echo "✅ All specs valid"

  # ── Step 3: Run tests ───────────────────────
  test:
    name: "🧪 Tests"
    runs-on: ubuntu-latest
    needs: [spec-gate]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --if-present

      - name: Run tests
        run: |
          if [ -f "package.json" ] && grep -q '"test"' package.json; then
            npm test
          else
            echo "⚠️ No test script found — skipping"
          fi

  # ── Step 4: Build Docker image ──────────────
  build:
    name: "🐳 Build"
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f "infra/docker/Dockerfile" ]; then
            docker build -f infra/docker/Dockerfile -t app:ci-${{ github.sha }} .
            echo "✅ Docker build successful"
          else
            echo "⚠️ No Dockerfile found — skipping build"
          fi

  # ── Step 5: Security scanning ────────────────
  security:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Secret detection
        run: |
          echo "🔍 Scanning for hardcoded secrets..."

          SECRETS_FOUND=0
          # Check for common secret patterns in source code
          for file in $(find src/ -type f 2>/dev/null); do
            # Check for common secret patterns (API keys, tokens, passwords)
            if grep -nEi '(api[_-]?key|secret[_-]?key|password|token|credential)\s*[:=]\s*["\x27][^"\x27]{8,}' "$file" 2>/dev/null; then
              echo "⚠️ Potential secret found in: $file"
              ((SECRETS_FOUND++))
            fi
          done

          if [ "$SECRETS_FOUND" -gt 0 ]; then
            echo "❌ $SECRETS_FOUND file(s) may contain hardcoded secrets"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Dependency vulnerability check
        run: |
          echo "🔍 Checking dependencies for known vulnerabilities..."

          if [ -f "package.json" ]; then
            npm audit --production --audit-level=high 2>/dev/null || echo "⚠️ npm audit found vulnerabilities (review required)"
          fi

          if [ -f "requirements.txt" ]; then
            pip install pip-audit 2>/dev/null && pip-audit -r requirements.txt 2>/dev/null || echo "⚠️ pip-audit found vulnerabilities (review required)"
          fi

          echo "✅ Dependency check complete"

  # ── Step 6: Traceability check ──────────────
  traceability:
    name: "🔗 Traceability"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify traceability chain
        run: |
          echo "🔍 Checking traceability: intake → spec → code"

          ORPHAN_SPECS=0
          for spec in specs/*/spec.md; do
            [ -f "$spec" ] || continue
            if ! grep -q 'intake/' "$spec"; then
              echo "⚠️ $spec has no intake traceability"
              ((ORPHAN_SPECS++))
            fi
          done

          if [ "$ORPHAN_SPECS" -gt 0 ]; then
            echo "::warning::$ORPHAN_SPECS spec(s) missing intake traceability"
          else
            echo "✅ All specs traceable to intake"
          fi
